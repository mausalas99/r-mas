<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>R+ Móvil</title>
  <script>
    (function () {
      var q = location.search ? location.search.slice(1) : '';
      var params = new URLSearchParams(q);
      params.set('rpc-mobile', '1');
      location.replace('/?' + params.toString());
    })();
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 1rem;">Abriendo R+ Móvil…</p>
</body>
</html>
