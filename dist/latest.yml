releaseNotes: |
  Parche sobre 7.6.8: corrige el resaltado de valores alterados en gasometría y el anión gap al importar desde el repositorio cuando gasometría y química vienen en solicitudes separadas.
  
  Labs — gasometría — pH, pCO₂, pO₂, lactato, bicarbonato y demás campos vuelven a marcarse con asterisco y subrayado rojo cuando están fuera de rango.
  
  Labs — mantenimiento — Al reconstruir la línea GASES se preservan asteriscos y se reaplican rangos del reporte (refsBySection).
  
  Repositorio — Al fusionar reportes del mismo día (p. ej. gasometría + electrolitos), R+ recalcula AG y Delta-Delta con Na/Cl de la química.
